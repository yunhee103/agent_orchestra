<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Agent Orchestra</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    /* Graphite 관제실 팔레트 — 차분한 청회색 바탕 + 인디고 포인트 */
    --bg: #0e1116; --panel: #151a21; --panel-2: #1b232e;
    --border: #27303d; --border-soft: #1e2530;
    --text: #e7ecf3; --dim: #8b96a8;
    --accent: #7c8cf8; --accent-press: #6577e8; --accent-dim: #2a3152;
    --ok: #3fd9a3; --bad: #f0716a; --warn: #e5b45b;
    --mono: "JetBrains Mono", Consolas, "Courier New", monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.55 "Pretendard Variable", Pretendard, "Malgun Gothic",
              system-ui, sans-serif;
         -webkit-font-smoothing: antialiased; }
  .layout { display: flex; gap: 16px; max-width: 1440px; margin: 0 auto;
            padding: 20px 16px; align-items: flex-start; }
  h1 { font-size: 17px; margin: 0 0 10px; font-weight: 700;
       display: flex; align-items: center; gap: 8px; letter-spacing: -.01em; }
  h1 svg { color: var(--accent); }
  .game-col { flex: 1; min-width: 0; }
  .side { width: 384px; flex-shrink: 0; display: flex; flex-direction: column;
          gap: 12px; }
  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: 12px; padding: 16px; }
  /* 계기판 라벨 — 섹션 헤더 */
  h2 { font-size: 11px; margin: 0 0 10px; color: var(--dim);
       letter-spacing: .14em; font-weight: 600;
       display: flex; align-items: center; gap: 6px; }
  h2 svg, .entry svg, .stats svg { width: 14px; height: 14px;
       vertical-align: -2px; flex-shrink: 0; }
  h2 svg { color: var(--accent); }

  /* 라이브 상태 스트립 — 이 페이지의 시그니처 */
  .stage-bar { display: flex; align-items: center; gap: 10px;
               font-family: var(--mono); font-size: 11px; color: var(--dim);
               letter-spacing: .08em; padding: 8px 14px;
               background: var(--panel); border: 1px solid var(--border);
               border-bottom: 0; border-radius: 12px 12px 0 0; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%;
              background: #3a4353; flex-shrink: 0; }
  .live-dot.on { background: var(--ok);
                 box-shadow: 0 0 0 3px color-mix(in srgb, var(--ok) 25%, transparent);
                 animation: blink 1.6s infinite; }
  @keyframes blink { 50% { opacity: .55; } }
  #stageText { color: var(--text); }
  .sb-right { margin-left: auto; }
  .sb-right b { color: var(--accent); font-weight: 600; }

  .stage { position: relative; border: 1px solid var(--border);
           border-radius: 0 0 12px 12px; overflow: hidden; background: #0a0d12; }
  canvas { display: block; width: 100%; image-rendering: pixelated; }

  /* 결정 대화창 */
  #dialog { display: none; position: absolute; left: 3%; right: 3%; bottom: 3%;
            background: color-mix(in srgb, var(--panel) 96%, transparent);
            backdrop-filter: blur(6px);
            border: 1px solid var(--accent); border-radius: 12px;
            padding: 16px 18px; max-height: 62%; overflow: auto;
            box-shadow: 0 12px 40px rgba(0,0,0,.55); }
  .dlg-head { color: var(--accent); font-weight: 700; margin-bottom: 6px;
              font-size: 12px; letter-spacing: .1em; }
  .dlg-q { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .dlg-why { color: var(--dim); font-size: 12px; margin-bottom: 10px; }
  .dlg-opt { border: 1px solid var(--border); border-radius: 10px;
             padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
             transition: border-color .15s, background .15s; }
  .dlg-opt:hover { border-color: var(--accent); background: var(--panel-2); }
  .dlg-opt.rec { border-color: var(--accent);
                 background: color-mix(in srgb, var(--accent) 8%, transparent); }
  .dlg-detail { color: var(--dim); font-size: 12px; margin-top: 4px; }
  .dlg-reason { color: var(--accent); font-size: 12px; margin-top: 4px; }
  .dlg-log { font-size: 11px; max-height: 140px; }

  /* 입력 요소 */
  textarea, input[type=text], input[type=password], select {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px;
    font: inherit; transition: border-color .15s; }
  textarea:focus, input:focus, select:focus {
    outline: none; border-color: var(--accent); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  textarea { min-height: 64px; resize: vertical; }
  button { background: var(--accent); color: #10142b; border: 0;
           border-radius: 8px; padding: 9px 16px; font: inherit;
           font-weight: 700; cursor: pointer; white-space: nowrap;
           flex-shrink: 0; transition: background .15s; }
  button:hover { background: var(--accent-press); }
  button:disabled { opacity: .4; cursor: default; }
  button.tool { background: transparent; color: var(--text);
                border: 1px solid var(--border); font-weight: 600;
                padding: 7px 12px; font-size: 12px; }
  button.tool:hover { border-color: var(--accent); color: var(--accent);
                      background: transparent; }
  .row { display: flex; gap: 8px; margin-top: 10px; }
  .row input { flex: 1; }
  .stats { color: var(--dim); font-size: 12px; margin-top: 10px; }
  .stats b { color: var(--accent); font-weight: 600; }

  /* 모델 셀렉트 */
  .mrow { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .mrow span { width: 106px; color: var(--dim); font-size: 12px;
               flex-shrink: 0; }
  .mrow select { flex: 1; padding: 6px 8px; font-size: 12px;
                 font-family: var(--mono); }
  .mrow select:disabled { opacity: .55; }
  .krow { display: flex; align-items: center; gap: 8px; margin-bottom: 7px;
          font-size: 12px; }
  .krow span { width: 74px; color: var(--dim); flex-shrink: 0; }
  .krow input, .krow select { flex: 1; padding: 7px 9px; font-size: 12px; }
  .krow em { font-style: normal; font-size: 11px; color: var(--ok);
             white-space: nowrap; }

  /* 서기의 기록 */
  #chronicle { max-height: 400px; overflow: auto; font-size: 13px; }
  #chronicle .entry { padding: 8px 0 8px 10px;
                      border-bottom: 1px solid var(--border-soft);
                      border-left: 2px solid var(--border-soft); margin-left: 2px; }
  #chronicle .entry.meet { border-left-color: var(--accent); }
  #chronicle .entry.fail { border-left-color: var(--bad); color: var(--bad); }
  #chronicle .entry svg { color: var(--dim); margin-right: 2px; }
  #chronicle .entry.meet svg { color: var(--accent); }
  #chronicle .t { color: var(--dim); font-size: 11px; margin-right: 6px;
                  font-family: var(--mono); }
  #chronicle code { background: var(--panel-2); padding: 1px 5px;
                    border-radius: 5px; font-size: 12px;
                    font-family: var(--mono); }
  #chronicle pre { white-space: pre-wrap; font-size: 11px; color: var(--dim);
                   font-family: var(--mono); }
  details summary { cursor: pointer; color: var(--dim); font-size: 12px; }

  /* 태스크 칩 */
  #taskChips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 7px;
          border: 1px solid var(--border); background: var(--panel-2);
          border-radius: 999px; padding: 4px 11px; font-size: 12px;
          cursor: pointer; font-family: var(--mono);
          transition: border-color .15s; }
  .chip:hover { border-color: var(--accent); }
  .chip i { width: 7px; height: 7px; border-radius: 50%;
            display: inline-block; }
  .chip em { color: var(--warn); font-style: normal; font-size: 11px; }

  /* 모달 */
  #modal { display: none; position: fixed; inset: 0;
           background: rgba(6, 8, 12, .7); backdrop-filter: blur(3px);
           align-items: center; justify-content: center; z-index: 10; }
  .modal-box { background: var(--panel); border: 1px solid var(--border);
               border-radius: 12px; max-width: 760px; width: 92%;
               max-height: 80vh; overflow: auto; padding: 18px; }
  .modal-box pre { background: var(--bg); border: 1px solid var(--border);
                   border-radius: 8px; padding: 10px; font-size: 12px;
                   overflow: auto; white-space: pre-wrap;
                   font-family: var(--mono); }
  .credit { color: var(--dim); font-size: 11px; text-align: right;
            margin-top: 8px; }
  /* 토스트 알림 */
  #toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
           display: flex; flex-direction: column; gap: 8px; z-index: 20;
           pointer-events: none; }
  .toast { background: var(--panel); border: 1px solid var(--border);
           border-left: 3px solid var(--accent); border-radius: 10px;
           padding: 10px 16px; font-size: 13px; color: var(--text);
           box-shadow: 0 8px 28px rgba(0,0,0,.5);
           display: flex; align-items: center; gap: 8px;
           animation: toast-in .18s ease-out; }
  .toast.err { border-left-color: var(--bad); }
  .toast svg { width: 15px; height: 15px; color: var(--accent);
               flex-shrink: 0; }
  .toast.err svg { color: var(--bad); }
  @keyframes toast-in { from { opacity: 0; transform: translateY(-6px); } }
  .hidden { display: none; }
  @media (prefers-reduced-motion: reduce) {
    .live-dot.on { animation: none; }
    * { transition: none !important; }
  }
  /* 좁은 화면: 게임 뷰 위, 패널 아래로 스택 */
  @media (max-width: 1100px) {
    .layout { flex-direction: column; }
    .side { width: 100%; }
  }
</style>
</head>
<body>
<div class="layout">
  <div class="game-col">
    <div class="stage-bar">
      <span class="live-dot" id="liveDot"></span>
      <span id="stageText">대기 중</span>
      <span class="sb-right">LLM <b id="sbCalls">0</b>/60 calls</span>
    </div>
    <div class="stage">
      <canvas id="game" width="960" height="528"></canvas>
      <div id="dialog"></div>
    </div>
    <p class="credit">그래픽: 자체 제작</p>
  </div>

  <div class="side">
    <div class="panel">
      <h1><i data-lucide="workflow"></i>Agent Orchestra</h1>
      <textarea id="reqInput" placeholder="예: FastAPI로 할일 관리 REST API 만들어줘"></textarea>
      <div class="row">
        <input type="text" id="workdirInput" value="./projects"
               title="프로젝트 폴더들이 생성될 상위 디렉토리">
        <button id="startBtn">의뢰하기</button>
      </div>
      <div class="row hidden" id="projectRow" style="align-items:center">
        <span class="stats" style="margin-top:0"><i data-lucide="folder"></i>
          프로젝트: <b id="projName"></b></span>
        <button class="tool" id="btnRename">폴더명 변경</button>
      </div>
      <div class="stats">
        LLM 호출 <b id="llmCalls">0</b> / 60
        <span id="modelInfo" style="margin-left:10px"></span>
      </div>
    </div>

    <div class="panel">
      <h2><i data-lucide="brain-circuit"></i>역할별 모델</h2>
      <div id="modelPanel"></div>
      <div class="mrow"><span>포니테일 강도</span>
        <select id="ponytailLevel">
          <option value="lite">lite — 보수적</option>
          <option value="full" selected>full — 기본</option>
          <option value="ultra">ultra — 공격적 정리</option>
          <option value="off">off — 미장착</option>
        </select>
      </div>
    </div>

    <div class="panel">
      <h2><i data-lucide="scissors"></i>포니테일 도구 — 출력 프로젝트 대상</h2>
      <div class="row" style="margin-top:0">
        <button class="tool" id="btnAudit">전체 감사</button>
        <button class="tool" id="btnDebt">부채 추적</button>
        <button class="tool" id="btnGain">규모 지표</button>
      </div>
      <div class="stats">감사는 Fable 5 호출(비용 발생), 부채·지표는 무료(정적 분석)</div>
    </div>

    <div class="panel">
      <h2><i data-lucide="list-checks"></i>태스크 현황 — 클릭하면 상세</h2>
      <div id="taskChips"></div>
    </div>

    <div class="panel">
      <h2><i data-lucide="notebook-pen"></i>서기의 기록</h2>
      <div id="chronicle"></div>
    </div>

    <div class="panel">
      <h2><i data-lucide="key-round"></i>API 키 연동</h2>
      <div class="krow"><span>Claude 인증</span>
        <select id="claudeAuth">
          <option value="api">API 키 (크레딧 결제)</option>
          <option value="subscription">구독 (Claude Code, Pro/Max)</option>
        </select></div>
      <div class="krow"><span>Claude</span>
        <input type="password" id="keyAnthropic" placeholder="sk-ant-...">
        <em id="stAnthropic"></em></div>
      <div class="krow"><span>OpenAI</span>
        <input type="password" id="keyOpenai" placeholder="sk-...">
        <em id="stOpenai"></em></div>
      <div class="krow"><span>Gemini</span>
        <input type="password" id="keyGoogle" placeholder="AI...">
        <em id="stGoogle"></em></div>
      <div class="row">
        <button id="btnSaveKeys">저장</button>
        <span class="stats" style="margin-top:0">이 PC의 .env 파일에만 저장.
          저장 즉시 모델 선택지에 반영.</span>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <button id="modalClose">닫기</button>
  </div>
</div>

<script src="/static/assets/vendor/lucide.min.js"></script>
<script>
  // 개발 편의: 캐시 우회 로드. 배포 시 고정 버전 쿼리로 바꿀 것.
  const s = document.createElement("script");
  s.src = "/static/game.js?v=" + Date.now();
  document.body.appendChild(s);
</script>
</body>
</html>
